<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a0b;
    --panel:    #0e0e10;
    --rule:     #1e1e22;
    --rule-hi:  #2e2e34;
    --dim:      #44444e;
    --mid:      #7a7a88;
    --text:     #b8b8c8;
    --hi:       #e8e8f0;
    --gold:     #c8a96e;
    --gold-dim: rgba(200,169,110,0.12);
    --up:       #5aaf82;
    --down:     #c0604a;
    --warn:     #c8953a;
    --up-dim:   rgba(90,175,130,0.1);
    --down-dim: rgba(192,96,74,0.1);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT ── */
  .shell {
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: 1fr 28px;
    height: 100vh;
  }

  /* ── PHOTO PANE ── */
  .photo-pane {
    position: relative;
    overflow: hidden;
    background: #000;
    border-right: 1px solid var(--rule);
  }
  .slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.6s ease-in-out;
  }
  .slide.active { opacity: 1; }

  /* Dark gradient on right edge only — bleeds into panel */
  .photo-pane::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(10,10,11,0.55) 0%,
      transparent 30%,
      transparent 70%,
      rgba(10,10,11,0.7) 100%
    );
    pointer-events: none;
  }

  /* Clock — bottom left, minimal */
  .clock-overlay {
    position: absolute;
    bottom: 28px;
    left: 28px;
    z-index: 10;
  }
  .clock-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 56px;
    font-weight: 300;
    line-height: 1;
    color: #fff;
    letter-spacing: -1px;
    text-shadow: 0 1px 20px rgba(0,0,0,0.8);
  }
  .clock-date {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Slide indicators — minimal dashes not dots */
  .dots {
    position: absolute;
    bottom: 28px;
    right: 28px;
    display: flex;
    gap: 4px;
    z-index: 10;
  }
  .dot {
    width: 16px; height: 1px;
    background: rgba(255,255,255,0.25);
    transition: background 0.4s, width 0.4s;
  }
  .dot.active { background: rgba(255,255,255,0.85); width: 28px; }

  /* ── INFO PANEL ── */
  .info-panel {
    background: var(--panel);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    border-right: none;
  }
  .info-panel::-webkit-scrollbar { width: 0; }

  /* Section — ruled, no rounded cards */
  .section {
    border-bottom: 1px solid var(--rule);
    padding: 14px 18px;
  }
  .section:last-child { border-bottom: none; }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8.5px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 11px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  /* ── TFL ── */
  .tfl-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--rule);
  }
  .tfl-row:last-child { border-bottom: none; padding-bottom: 0; }
  .tfl-row:first-child { padding-top: 0; }

  .roundel-wrap { flex-shrink: 0; width: 36px; height: 36px; }
  .roundel-wrap img { width: 36px; height: 36px; display: block; }

  .tfl-info { flex: 1; min-width: 0; }
  .tfl-line-name {
    font-size: 11px;
    font-weight: 500;
    color: var(--hi);
    letter-spacing: 0.01em;
  }

  .status-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 0.05em;
    margin-top: 3px;
    text-transform: uppercase;
  }
  .status-tag::before {
    content: '';
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .s-good  { color: var(--up);   }
  .s-good::before  { background: var(--up); }
  .s-warn  { color: var(--warn); }
  .s-warn::before  { background: var(--warn); }
  .s-bad   { color: var(--down); }
  .s-bad::before   { background: var(--down); }

  .disruption-list { margin-top: 5px; }
  .disruption-item {
    font-size: 10px;
    color: var(--mid);
    line-height: 1.5;
    padding: 3px 0 3px 9px;
    border-left: 1px solid var(--warn);
    margin-top: 3px;
  }

  /* ── TRAINS ── */
  .train-row {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid var(--rule);
  }
  .train-row:last-child { border-bottom: none; padding-bottom: 0; }
  .train-row:first-child { padding-top: 0; }

  .train-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 400;
    color: var(--hi);
    line-height: 1;
    letter-spacing: -0.5px;
  }
  .train-dest {
    font-size: 11px;
    color: var(--text);
    line-height: 1.3;
  }
  .train-plat {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    margin-top: 2px;
  }
  .train-status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    text-align: right;
    white-space: nowrap;
  }
  .ts-ok  { color: var(--up); }
  .ts-bad { color: var(--down); }
  .ts-warn { color: var(--warn); }
  .train-updated {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: var(--dim);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* ── JOURNEY ── */
  .journey-block {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .journey-mins {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 40px;
    font-weight: 300;
    line-height: 1;
    color: var(--hi);
    letter-spacing: -1px;
  }
  .journey-unit {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--dim);
  }
  .journey-meta {
    margin-top: 7px;
    font-size: 10px;
    color: var(--mid);
    line-height: 1.6;
  }
  .journey-meta span { color: var(--text); }
  .journey-bar {
    height: 1px;
    background: var(--rule-hi);
    margin-top: 10px;
    position: relative;
    overflow: visible;
  }
  .journey-fill {
    position: absolute;
    top: 0; left: 0;
    height: 1px;
    transition: width 1s ease, background 1s ease;
  }
  .journey-updated {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: var(--dim);
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  /* ── WEATHER ── */
  .weather-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .weather-col {
    padding-right: 14px;
  }
  .weather-col + .weather-col {
    padding-right: 0;
    padding-left: 14px;
    border-left: 1px solid var(--rule);
  }
  .weather-loc {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .weather-main {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .weather-temp {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 300;
    color: var(--hi);
    line-height: 1;
    letter-spacing: -0.5px;
  }
  .weather-icon { font-size: 18px; line-height: 1; }
  .weather-desc {
    font-size: 10px;
    color: var(--mid);
    margin-top: 4px;
    line-height: 1.3;
  }

  /* ── STATUS BAR ── */
  .statusbar {
    grid-column: 1 / -1;
    background: var(--bg);
    border-top: 1px solid var(--rule);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8.5px;
    color: var(--dim);
    letter-spacing: 0.08em;
  }
  .statusbar-right { display: flex; gap: 16px; align-items: center; }

  .refresh-btn {
    background: none;
    border: none;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8.5px;
    cursor: pointer;
    letter-spacing: 0.08em;
    padding: 0;
    transition: color 0.2s;
  }
  .refresh-btn:hover { color: var(--gold); }

  .spinner {
    display: inline-block;
    width: 7px; height: 7px;
    border: 1px solid var(--rule-hi);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .spinner.active { opacity: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Gold accent line at very top of panel */
  .info-panel::before {
    content: '';
    display: block;
    height: 2px;
    background: linear-gradient(to right, var(--gold), transparent);
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="shell">

  <!-- ── LEFT: PHOTOS ── -->
  <div class="photo-pane" id="photoPane">
    <div class="clock-overlay">
      <div class="clock-time" id="clockTime">--:--</div>
      <div class="clock-date" id="clockDate"></div>
    </div>
    <div class="dots" id="dots"></div>
  </div>

  <!-- ── RIGHT: PANEL ── -->
  <div class="info-panel">

    <!-- TFL -->
    <div class="section">
      <div class="section-label">TfL Status</div>

      <div class="tfl-row">
        <div class="roundel-wrap">
          <img src="./northern-roundel.svg" alt="Northern">
        </div>
        <div class="tfl-info">
          <div class="tfl-line-name">Northern line</div>
          <div id="northernPill"></div>
          <div class="disruption-list" id="northernDisruptions"></div>
        </div>
      </div>

      <div class="tfl-row">
        <div class="roundel-wrap">
          <img src="./wc-roundel.svg" alt="Waterloo & City">
        </div>
        <div class="tfl-info">
          <div class="tfl-line-name">Waterloo &amp; City line</div>
          <div id="waterlooPill"></div>
          <div class="disruption-list" id="waterlooDisruptions"></div>
        </div>
      </div>
    </div>

    <!-- TRAINS -->
    <div class="section">
      <div class="section-label">Waterloo → Aldershot</div>
      <div id="trainList">
        <div style="font-size:10px;color:var(--dim);font-family:'IBM Plex Mono',monospace">LOADING…</div>
      </div>
      <div class="train-updated" id="trainUpdated"></div>
    </div>

    <!-- DRIVE -->
    <div class="section">
      <div class="section-label">Morden → Home</div>
      <div class="journey-block">
        <div class="journey-mins" id="journeyMins">--</div>
        <div class="journey-unit">min</div>
      </div>
      <div class="journey-meta">
        <span>Morden Station</span> → <span>Farnham GU9 9FT</span><br>
        <span id="journeyVia" style="color:var(--mid)">via A3 / A31</span>
      </div>
      <div class="journey-bar">
        <div class="journey-fill" id="trafficFill" style="width:0%"></div>
      </div>
      <div class="journey-updated" id="journeyUpdated"></div>
    </div>

    <!-- WEATHER -->
    <div class="section">
      <div class="section-label">Weather</div>
      <div class="weather-cols">
        <div class="weather-col">
          <div class="weather-loc">Farnham GU9</div>
          <div class="weather-main">
            <div class="weather-icon" id="farnhamIcon">—</div>
            <div class="weather-temp" id="farnhamTemp">--°</div>
          </div>
          <div class="weather-desc" id="farnhamDesc">Loading</div>
        </div>
        <div class="weather-col">
          <div class="weather-loc">Central London</div>
          <div class="weather-main">
            <div class="weather-icon" id="londonIcon">—</div>
            <div class="weather-temp" id="londonTemp">--°</div>
          </div>
          <div class="weather-desc" id="londonDesc">Loading</div>
        </div>
      </div>
    </div>

  </div>

  <!-- ── STATUS BAR ── -->
  <div class="statusbar">
    <span>PERSONAL DASHBOARD</span>
    <div class="statusbar-right">
      <span><span class="spinner" id="spinner"></span>60s REFRESH</span>
      <button class="refresh-btn" onclick="refreshAll()">↻ REFRESH</button>
      <span id="lastRefresh"></span>
    </div>
  </div>

</div>
<script>
// ── PHOTOS — replace with your own ──
const PHOTOS = [
  './photo1.jpg',
  './photo2.jpg',
  './photo3.jpg',
  './photo4.jpg',
  './photo5.jpg',
  './photo6.jpg',
  './photo7.jpg',
  './photo8.jpg',
  './photo9.jpg',
  './photo10.jpg',
];

const SLIDE_MS   = 8000;
const REFRESH_MS = 60000;

const FARNHAM_LAT = 51.2141, FARNHAM_LNG = -0.7996;
const LONDON_LAT  = 51.5074, LONDON_LNG  = -0.1278;
const MORDEN_LAT  = 51.4017, MORDEN_LNG  = -0.1948;

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  document.getElementById('clockTime').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clockDate').textContent =
    now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' }).toUpperCase();
}
updateClock();
setInterval(updateClock, 10000);

// ── SLIDESHOW ──
let currentSlide = 0;
function buildSlideshow() {
  const pane   = document.getElementById('photoPane');
  const dotsEl = document.getElementById('dots');
  PHOTOS.forEach((url, i) => {
    const s = document.createElement('div');
    s.className = 'slide' + (i===0?' active':'');
    s.style.backgroundImage = `url('${url}')`;
    pane.insertBefore(s, pane.querySelector('.clock-overlay'));
    const d = document.createElement('div');
    d.className = 'dot' + (i===0?' active':'');
    dotsEl.appendChild(d);
  });
  setInterval(() => {
    const slides = document.querySelectorAll('.slide');
    const dots   = document.querySelectorAll('.dot');
    slides[currentSlide].classList.remove('active');
    dots[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % PHOTOS.length;
    slides[currentSlide].classList.add('active');
    dots[currentSlide].classList.add('active');
  }, SLIDE_MS);
}
buildSlideshow();

// ── TFL ──
function proxy(url) {
  return `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
}
async function tflFetch(url) {
  try {
    const r = await fetch(url, { headers:{'Accept':'application/json'} });
    if (!r.ok) throw 0;
    return await r.json();
  } catch {
    const r = await fetch(proxy(url));
    const w = await r.json();
    return JSON.parse(w.contents);
  }
}
function renderLine(data, pillId, disruptId) {
  const statuses = data.lineStatuses || [];
  const summary  = statuses[0]?.statusSeverityDescription || 'Unknown';
  const severity = statuses[0]?.statusSeverity;
  const cls = severity===10 ? 's-good' : severity>=5 ? 's-warn' : 's-bad';
  document.getElementById(pillId).innerHTML =
    `<div class="status-tag ${cls}">${summary.toUpperCase()}</div>`;
  const disrupts = statuses.filter(s=>s.reason);
  document.getElementById(disruptId).innerHTML =
    disrupts.map(d=>`<div class="disruption-item">${d.reason}</div>`).join('');
}
async function fetchTfl() {
  try {
    const [northern, waterloo] = await Promise.all([
      tflFetch('https://api.tfl.gov.uk/Line/northern/Status'),
      tflFetch('https://api.tfl.gov.uk/Line/waterloo-city/Status')
    ]);
    renderLine(northern[0], 'northernPill', 'northernDisruptions');
    renderLine(waterloo[0], 'waterlooPill', 'waterlooDisruptions');
  } catch {
    ['northernPill','waterlooPill'].forEach(id => {
      document.getElementById(id).innerHTML =
        '<div class="status-tag s-warn">UNAVAILABLE</div>';
    });
  }
}

// ── TRAINS ──
async function fetchTrains() {
  try {
    const ENDPOINTS = [
      'https://national-rail-api.davwheat.dev/departures/WAT/5?filterType=to&filterStation=AHT',
      'https://huxley2.azurewebsites.net/departures/WAT/5?filterType=to&filterStation=AHT',
    ];
    let data = null;
    for (const url of ENDPOINTS) {
      try {
        const r = await fetch(url);
        if (!r.ok) throw 0;
        data = await r.json();
        if (data) break;
      } catch {
        try {
          const r = await fetch(proxy(url));
          const w = await r.json();
          data = JSON.parse(w.contents);
          if (data) break;
        } catch {}
      }
    }

    const services = data?.trainServices || [];
    const list = document.getElementById('trainList');

    if (!services.length) {
      list.innerHTML = '<div style="font-size:10px;color:var(--dim);font-family:\'IBM Plex Mono\',monospace">NO SERVICES FOUND</div>';
      return;
    }

    list.innerHTML = services.slice(0,3).map(s => {
      const dep  = s.std || '--:--';
      const etd  = s.etd || 'On time';
      const plat = s.platform ? `PLT ${s.platform}` : '';
      const dest = s.destination?.[0]?.locationName || 'Aldershot';

      let sc = 'ts-ok', st = 'ON TIME';
      if (etd === 'Cancelled')                        { sc='ts-bad';  st='CANCELLED'; }
      else if (etd === 'Delayed')                     { sc='ts-bad';  st='DELAYED'; }
      else if (etd !== 'On time' && etd !== dep)      { sc='ts-warn'; st=`EXP ${etd}`; }

      return `<div class="train-row">
        <div class="train-time">${dep}</div>
        <div>
          <div class="train-dest">${dest}</div>
          <div class="train-plat">${plat}</div>
        </div>
        <div class="train-status ${sc}">${st}</div>
      </div>`;
    }).join('');

    document.getElementById('trainUpdated').textContent =
      `UPDATED ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
  } catch {
    document.getElementById('trainList').innerHTML =
      '<div style="font-size:10px;color:var(--dim);font-family:\'IBM Plex Mono\',monospace">UNAVAILABLE</div>';
  }
}

// ── JOURNEY ──
const ORS_KEY = 'YOUR_ORS_API_KEY';
async function fetchJourney() {
  try {
    const body = { coordinates: [[MORDEN_LNG,MORDEN_LAT],[FARNHAM_LNG,FARNHAM_LAT]] };
    const res = await fetch('https://api.openrouteservice.org/v2/directions/driving-car/json', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':ORS_KEY},
      body: JSON.stringify(body)
    });
    if (!res.ok) throw 0;
    const data = await res.json();
    const { duration, distance } = data.routes[0].summary;
    const mins = Math.round(duration/60);
    const km   = (distance/1000).toFixed(0);
    document.getElementById('journeyMins').textContent = mins;
    document.getElementById('journeyVia').textContent  = `${km} KM · A3 / A31`;
    const fill = document.getElementById('trafficFill');
    fill.style.width = Math.min(100,(mins/90)*100)+'%';
    fill.style.background = mins<45?'var(--up)':mins<75?'var(--warn)':'var(--down)';
    document.getElementById('journeyUpdated').textContent =
      `UPDATED ${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
  } catch {
    document.getElementById('journeyMins').textContent = '~55';
    document.getElementById('journeyVia').textContent  = 'ESTIMATED · ADD ORS KEY FOR LIVE';
    document.getElementById('trafficFill').style.width = '60%';
    document.getElementById('trafficFill').style.background = 'var(--warn)';
  }
}

// ── WEATHER ──
const WMO = {
  0:['Clear','☀'],1:['Mainly clear','🌤'],2:['Partly cloudy','⛅'],3:['Overcast','☁'],
  45:['Fog','🌫'],48:['Icy fog','🌫'],51:['Light drizzle','🌦'],53:['Drizzle','🌦'],
  55:['Heavy drizzle','🌧'],61:['Light rain','🌧'],63:['Rain','🌧'],65:['Heavy rain','🌧'],
  71:['Light snow','🌨'],73:['Snow','❄'],75:['Heavy snow','❄'],80:['Showers','🌦'],
  81:['Showers','🌧'],82:['Heavy showers','🌧'],95:['Storm','⛈'],99:['Storm','⛈']
};
async function fetchWeatherFor(lat, lng, tempId, descId, iconId) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}` +
    `&current=temperature_2m,weathercode&temperature_unit=celsius&timezone=Europe%2FLondon`;
  const r    = await fetch(url);
  const data = await r.json();
  const code = data.current.weathercode;
  const [desc, icon] = WMO[code] || ['—','—'];
  document.getElementById(tempId).textContent = `${Math.round(data.current.temperature_2m)}°`;
  document.getElementById(descId).textContent = desc;
  document.getElementById(iconId).textContent = icon;
}
async function fetchWeather() {
  try {
    await Promise.all([
      fetchWeatherFor(FARNHAM_LAT, FARNHAM_LNG, 'farnhamTemp', 'farnhamDesc', 'farnhamIcon'),
      fetchWeatherFor(LONDON_LAT,  LONDON_LNG,  'londonTemp',  'londonDesc',  'londonIcon'),
    ]);
  } catch(e) { console.error(e); }
}

// ── REFRESH ──
async function refreshAll() {
  document.getElementById('spinner').classList.add('active');
  await Promise.all([fetchTfl(), fetchTrains(), fetchJourney(), fetchWeather()]);
  document.getElementById('spinner').classList.remove('active');
  document.getElementById('lastRefresh').textContent =
    `${new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
}

refreshAll();
setInterval(refreshAll, REFRESH_MS);
</script>
